<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ghostie's Store — Premium e-commerce store with curated products for the modern lifestyle. Shop headphones, watches, sneakers, and more.">
  <meta name="keywords" content="e-commerce, online store, shop, premium products, electronics, fashion">
  <meta name="author" content="anurag sonwani">
  <meta name="theme-color" content="#0a0a0f">

  <title>Ghostie's Store — Premium E-Commerce Store</title>

  <!-- Preconnect to external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">

  <!-- Favicon (inline SVG as data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236d2fff'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-size='60' font-weight='bold' fill='white'>N</text></svg>">

  <!-- Import Map for Speed Insights -->
  <script type="importmap">
    {
      "imports": {
        "@vercel/speed-insights": "https://cdn.jsdelivr.net/npm/@vercel/speed-insights@1/dist/index.mjs"
      }
    }
  </script>
</head>
<body>
  <!-- Header -->
  <header class="header" id="site-header" role="banner">
    <!-- Rendered by JS -->
  </header>

  <!-- Main Application -->
  <main id="app" role="main" aria-label="Main content">
    <!-- Pages rendered here by router -->
    <div class="main-content container" style="display:flex;align-items:center;justify-content:center;min-height:60vh">
      <div class="spinner" style="width:40px;height:40px;border-width:3px"></div>
    </div>
  </main>

  <!-- App Script -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
